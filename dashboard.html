<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boshqaruv paneli — StreamCast</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="wide-container" style="max-width: 640px;">
  <div class="topbar">
    <div class="brand" style="margin-bottom:0;">
      <div class="brand-mark">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 8L20 4V20L4 16V8Z" stroke="white" stroke-width="1.6" stroke-linejoin="round"/><circle cx="4" cy="12" r="2" fill="white"/></svg>
      </div>
      <div class="brand-name">Stream<span>Cast</span></div>
    </div>
    <button class="btn-ghost" onclick="logout()">Chiqish</button>
  </div>

  <div class="card" id="trialCard" style="display:none;">
    <div class="card" id="planCard">
  <div class="eyebrow">Tarif</div>

  <div id="planInfo" style="font-size:15px;">
    Yuklanmoqda...
  </div>

  <div id="streamLimitInfo"
       style="margin-top:10px; color: var(--text-dim);">
  </div>
</div>
    <div class="eyebrow">Hisob holati</div>
    <div id="accessInfo" style="font-size: 14px;"></div>
  </div>

  <div class="card">
    <div class="eyebrow">1-qadam</div>
    <h2>Video yuklash</h2>
    <p>Yuklangan video doimiy loop bo'lib efirga uzatiladi.</p>
    <input type="file" id="videoFile" accept="video/*">
    <button class="btn-outline" onclick="uploadVideo()">Videoni yuklash</button>
    <div id="proPlaylistBlock" style="display:none;margin-top:15px;">
  <hr style="margin:15px 0;">

  <h3>PRO Playlist</h3>

  <input type="file"
         id="playlistVideo"
         accept="video/*">

  <button class="btn-outline"
          onclick="uploadPlaylistVideo()">
    ➕ Playlistga qo'shish
  </button>

  <div id="playlistStatus"
       style="margin-top:10px;font-size:13px;color:var(--text-dim);">
  </div>
      <div style="margin-top:15px;">
  <h4>Playlist videolari</h4>

  <div id="playlistList">
    Playlist bo'sh
  </div>
</div>
</div>
    <div class="progress-track" style="margin-top:14px;"><div class="progress-fill" id="progressFill"></div></div>
    <div id="uploadStatus" style="font-size:13px; color: var(--text-dim); margin-top:6px;"></div>
  </div>

  <div class="card">
    <div class="eyebrow">2-qadam</div>
    <h2>YouTube efiri</h2>
    <label>Stream Key</label>
    <input type="text" id="streamKey" placeholder="YouTube Studio → Go Live → Stream Key">
    <button class="btn-signal" onclick="startStream()">▶ Efirni boshlash</button>
    <button class="btn-outline" style="margin-top:10px;" onclick="stopStream()">⏹ To'xtatish</button>
  </div>

  <div class="card">
    <div class="on-air" id="onAirIndicator"><span class="dot"></span><span id="onAirText">Nofaol</span></div>
    <div id="streamLog" style="font-family: var(--font-mono); font-size:12px; color: var(--text-faint); margin-top:10px; white-space: pre-wrap; max-height: 140px; overflow-y:auto;"></div>
  </div>
</div>

<script>
async function checkAccess() {
  const res = await fetch('/api/me');

  if (res.status === 401) {
    window.location.href = '/login.html';
    return;
  }

  const data = await res.json();

  const card = document.getElementById('trialCard');
  const info = document.getElementById('accessInfo');

  const planInfo = document.getElementById('planInfo');
  const streamLimitInfo = document.getElementById('streamLimitInfo');

  card.style.display = 'block';

  const plan = data.plan || 'free';

  if (plan === 'pro') {
    planInfo.innerHTML =
      '<span class="badge badge-approved">PRO</span>';

    streamLimitInfo.innerHTML =
      'Maksimal streamlar: <b>5 ta</b>';
    document.getElementById('proPlaylistBlock').style.display = 'block';
  } else {
    planInfo.innerHTML =
      '<span class="badge badge-pending">FREE</span>';

    streamLimitInfo.innerHTML =
      'Maksimal streamlar: <b>1 ta</b>';
  }

  if (data.trialActive) {
    const hrs = Math.max(
      0,
      Math.round(
        (new Date(data.trialEnd) - new Date()) / 3600000
      )
    );

    info.innerHTML =
      `<span class="badge badge-pending">Bepul sinov</span> — taxminan ${hrs} soat qoldi`;

  } else if (data.subscriptionActive) {

    const d = new Date(data.paidUntil);

    info.innerHTML =
      `<span class="badge badge-approved">Faol obuna</span> — ${d.toLocaleDateString('uz-UZ')} gacha`;

  } else {

    info.innerHTML =
      `<span class="badge badge-rejected">Muddat tugagan</span> — <a href="/payment.html">to'lov qilish</a>`;
  }
}

function uploadVideo() {
  const fileInput = document.getElementById('videoFile');
  if (!fileInput.files.length) return alert('Video tanlang');
  const file = fileInput.files[0];
  const sizeMB = (file.size / (1024 * 1024)).toFixed(1);
  const formData = new FormData();
  formData.append('video', file);

  const statusEl = document.getElementById('uploadStatus');
  const fill = document.getElementById('progressFill');
  statusEl.innerText = `Yuklanmoqda... 0% (0 / ${sizeMB} MB)`;

  const xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/upload');
  xhr.upload.onprogress = (e) => {
    if (e.lengthComputable) {
      const percent = ((e.loaded / e.total) * 100).toFixed(1);
      fill.style.width = percent + '%';
      statusEl.innerText = `Yuklanmoqda... ${percent}% (${(e.loaded/1024/1024).toFixed(1)} / ${sizeMB} MB)`;
    }
  };
  xhr.onload = () => {
    try {
      const data = JSON.parse(xhr.responseText);
      statusEl.innerText = data.success ? '✅ Video yuklandi' : '❌ ' + data.error;
    } catch (e) { statusEl.innerText = '❌ Server javobida xatolik'; }
  };
  xhr.onerror = () => { statusEl.innerText = '❌ Tarmoq xatoligi'; };
  xhr.send(formData);
}

async function startStream() {
  const streamKey = document.getElementById('streamKey').value.trim();
  if (!streamKey) return alert('Stream key kiriting');
  const res = await fetch('/api/stream/start', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ streamKey })
  });
  const data = await res.json();
  if (!data.success) alert('Xato: ' + data.error);
}

async function stopStream() {
  const res = await fetch('/api/stream/stop', { method: 'POST' });
  const data = await res.json();
  if (!data.success) alert('Xato: ' + data.error);
}

async function pollStatus() {
  try {
    const res = await fetch('/api/stream/status');
    const data = await res.json();
    const indicator = document.getElementById('onAirIndicator');
    const text = document.getElementById('onAirText');
    indicator.className = 'on-air' + (data.running ? ' live' : '');
    text.innerText = data.running ? 'EFIRDA' : 'Nofaol';
    document.getElementById('streamLog').innerText = (data.log || []).slice(-6).join('\n');
  } catch (e) {}
}

async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login.html';
}
async function uploadPlaylistVideo() {
  const fileInput =
    document.getElementById('playlistVideo');

  if (!fileInput.files.length) {
    alert('Video tanlang');
    return;
  }

  const formData = new FormData();

  formData.append(
    'video',
    fileInput.files[0]
  );

  const res = await fetch(
    '/api/upload-playlist',
    {
  method: 'POST',
  credentials: 'same-origin',
  body: formData
}
  );

  const data = await res.json();

if (data.success) {
  document.getElementById('playlistStatus').innerText =
    '✅ Playlistga qo‘shildi';

  fileInput.value = '';

  loadPlaylist();
} else {
  document.getElementById('playlistStatus').innerText =
    '❌ ' + data.error;
}
}
  async function loadPlaylist() {
  const res = await fetch('/api/playlist');
  const files = await res.json();

  const container =
    document.getElementById('playlistList');

  if (!files.length) {
    container.innerHTML =
      '<div style="color:gray;">Playlist bo‘sh</div>';
    return;
  }
    async function deletePlaylistFile(file) {

  if (!confirm("Videoni o'chirishni tasdiqlaysizmi?")) {
    return;
  }

  const res = await fetch(
    '/api/playlist/' + encodeURIComponent(file),
    {
      method: 'DELETE'
    }
  );

  const data = await res.json();

  if (data.success) {
    loadPlaylist();
  } else {
    alert(data.error || 'Xatolik');
  }
}

 container.innerHTML = files.map(file => `
  <div style="
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px;
    margin:5px 0;
    border:1px solid #ddd;
    border-radius:8px;
  ">
    <span>🎬 ${file}</span>

    <button
      class="btn-outline"
      onclick="deletePlaylistFile('${file}')"
      style="width:auto;padding:6px 10px;"
    >
      🗑 O'chirish
    </button>
  </div>
`).join('');
}
checkAccess();
setInterval(pollStatus, 2000);
pollStatus();
  loadPlaylist();
</script>
</body>
</html>
