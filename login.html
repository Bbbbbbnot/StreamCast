<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kirish — StreamCast</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
  <div class="brand">
    <div class="brand-mark">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 8L20 4V20L4 16V8Z" stroke="white" stroke-width="1.6" stroke-linejoin="round"/><circle cx="4" cy="12" r="2" fill="white"/></svg>
    </div>
    <div class="brand-name">Stream<span>Cast</span></div>
  </div>

  <div class="card">
    <div class="eyebrow">Xush kelibsiz</div>
    <h2>Hisobingizga kiring</h2>
    <p>Video yuklang, YouTube Live'ga uzluksiz uzating.</p>

    <a href="/auth/google" style="display:block; margin-top: 18px;">
      <button type="button" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.97 10.72A5.4 5.4 0 0 1 3.68 9c0-.6.1-1.18.29-1.72V4.95H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.05l3.01-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.59-2.59C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
        Google orqali kirish
      </button>
    </a>

    <div class="divider">yoki</div>

    <form id="loginForm">
      <label>Foydalanuvchi nomi</label>
      <input type="text" id="username" placeholder="foydalanuvchi_nomi" required>
      <label>Parol</label>
      <input type="password" id="password" placeholder="••••••••" required>
      <div class="error-text" id="errorMsg"></div>
      <button type="submit" class="btn-signal">Kirish</button>
    </form>
  </div>

  <p style="text-align:center; font-size:13px;">Hisobingiz yo'qmi? Google orqali kirib, avtomatik ro'yxatdan o'ting.</p>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('errorMsg');
  errorEl.innerText = '';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = '/dashboard.html';
    } else {
      errorEl.innerText = data.error || 'Xatolik yuz berdi';
    }
  } catch (err) {
    errorEl.innerText = 'Server bilan bog\'lanishda xatolik';
  }
});
</script>
</body>
</html>
