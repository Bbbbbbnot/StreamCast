<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profilni yakunlash — StreamCast</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
  <div class="brand">
    <div class="brand-mark">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 8L20 4V20L4 16V8Z" stroke="white" stroke-width="1.6" stroke-linejoin="round"/><circle cx="4" cy="12" r="2" fill="white"/></svg>
    </div>
    <div class="brand-name">Stream<span>Cast</span></div>
  </div>

  <div class="card">
    <div class="eyebrow">Bir qadam qoldi</div>
    <h2>Profilingizni yakunlang</h2>
    <p>Google akkauntingiz tasdiqlandi. Endi tizimga kirish uchun foydalanuvchi nomi va parol o'rnating.</p>

    <form id="setupForm" style="margin-top: 18px;">
      <label>Foydalanuvchi nomi</label>
      <input type="text" id="username" placeholder="masalan: azizbek_01" required minlength="3">
      <label>Parol</label>
      <input type="password" id="password" placeholder="kamida 4 belgi" required minlength="4">
      <div class="error-text" id="errorMsg"></div>
      <button type="submit" class="btn-signal">Davom etish</button>
    </form>
  </div>

  <p style="text-align:center; font-size:13px;">1 kunlik bepul sinov darhol boshlanadi ✨</p>
</div>

<script>
document.getElementById('setupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('errorMsg');
  errorEl.innerText = '';
  try {
    const res = await fetch('/api/set-username', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = '/dashboard.html';
    } else {
      errorEl.innerText = data.error || 'Xatolik yuz berdi';
    }
  } catch (err) {
    errorEl.innerText = 'Server bilan bog\'lanishda xatolik';
  }
});
</script>
</body>
</html>
